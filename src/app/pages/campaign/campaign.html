<h1>Campaign</h1>

<section class="campaign__overview">
  <p class="campaign__overview-text">{{ overallCompleted() }} / 34 missions completed</p>
  <nx-progress-bar [value]="overallCompleted()" [max]="totalMissions" label="Overall campaign progress" />
</section>

@for (phase of phaseGroups(); track phase.phaseNumber) {
  <section class="campaign__phase">
    <nx-phase-header
      [phaseNumber]="phase.phaseNumber"
      [phaseName]="phase.name"
      [phaseDescription]="phase.description"
      [completedCount]="phase.completedCount"
      [totalCount]="phase.totalCount">
      <div class="campaign__phase-missions">
        @for (m of phase.missions; track m.mission.chapterId) {
          <nx-mission-card
            [mission]="m.mission"
            [isCompleted]="m.isCompleted"
            [isLocked]="m.isLocked"
            [isCurrent]="m.isCurrent"
            (missionClicked)="onMissionClicked($event)" />
        }
      </div>
    </nx-phase-header>
  </section>
}
