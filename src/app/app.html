<header class="top-bar">
  <a class="top-bar__logo" routerLink="/">Nexus Station</a>

  <div class="top-bar__status">
    <span class="top-bar__rank">{{ currentRank() }}</span>
    <nx-xp-progress-bar
      class="top-bar__xp"
      [currentXp]="rankProgress()"
      [nextRankXp]="100"
      [currentRank]="currentRank()" />
  </div>

  <a class="top-bar__settings" routerLink="/settings" aria-label="Settings">
    <span class="top-bar__settings-icon" aria-hidden="true"></span>
  </a>
</header>

<div class="app-body">
  <app-side-nav />

  <main class="content">
    <router-outlet />
  </main>

  <app-bottom-nav />
</div>

<nx-xp-notification />
