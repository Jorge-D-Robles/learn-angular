<div class="power-grid">
  <app-power-grid-board
    [services]="services()"
    [components]="components()"
    [connections]="connections()"
    [wireDescriptors]="wireDescriptors()"
    [previewColor]="selectedScopeColor()"
    [rejectionFlash]="rejectionFlash()"
    (connectionRightClicked)="onBoardConnectionRightClicked($event)"
    (mouseMoved)="onBoardMouseMoved($event)"
  />

  <!-- Controls (HTML below SVG) -->
  <div class="power-grid__controls">
    @for (scope of scopeOptions; track scope.key) {
      <button class="power-grid__scope-btn"
              [class.power-grid__scope-btn--active]="selectedScope() === scope.value"
              [style.borderColor]="scope.color"
              (click)="selectScope(scope.value)">
        {{ scope.label }} ({{ scope.key }})
      </button>
    }
    <button class="power-grid__verify-btn"
            [disabled]="verificationsRemaining() <= 0"
            (click)="onVerify()">
      Verify ({{ verificationsRemaining() }} left)
    </button>
  </div>
</div>
