<div class="power-grid-board" [class.power-grid-board--rejection]="rejectionFlash()">
  <svg #gridSvg
       class="power-grid-board__svg"
       [attr.viewBox]="viewBox"
       preserveAspectRatio="xMidYMid meet"
       (mousemove)="onMouseMove($event)"
       (contextmenu)="$event.preventDefault()">

    <!-- Panel backgrounds -->
    <rect class="power-grid-board__panel-bg power-grid-board__panel-bg--services"
          x="0" y="0" width="300" height="600" rx="8" />
    <rect class="power-grid-board__panel-bg power-grid-board__panel-bg--components"
          x="700" y="0" width="300" height="600" rx="8" />

    <!-- Panel labels -->
    <text class="power-grid-board__panel-label" x="150" y="30" text-anchor="middle">Services</text>
    <text class="power-grid-board__panel-label" x="850" y="30" text-anchor="middle">Components</text>

    <!-- Service ports (left side) -->
    @for (svc of servicePositions(); track svc.id) {
      <g nx-svg-port
         [portId]="svc.id"
         [x]="svc.x"
         [y]="svc.y"
         [color]="previewColor()"
         [label]="svc.name"
         type="source"
         [isActive]="isPortActive(svc.id)"
         [isConnected]="isServiceConnected(svc.id)" />
    }

    <!-- Component ports (right side) -->
    @for (cmp of componentPositions(); track cmp.id) {
      <g nx-svg-port
         [portId]="cmp.id"
         [x]="cmp.x"
         [y]="cmp.y"
         [color]="'#E2E8F0'"
         [label]="cmp.name"
         type="target"
         [isActive]="false"
         [isConnected]="isComponentConnected(cmp.id)" />
    }

    <!-- Power lines (committed connections) -->
    @for (wire of wireDescriptors(); track wire.id) {
      <path [attr.d]="wire.path"
            [attr.stroke]="wire.color"
            [class]="wire.cssClass"
            fill="none"
            stroke-width="2.5"
            stroke-linecap="round"
            pointer-events="stroke"
            (contextmenu)="onConnectionRightClick($event, wire.connectionId)" />
      @if (wire.animated) {
        <path [attr.d]="wire.path"
              class="power-grid-board__flow"
              stroke="rgba(255, 255, 255, 0.8)"
              fill="none"
              stroke-width="2"
              stroke-linecap="round"
              stroke-dasharray="8 12" />
      }
    }

    <!-- Preview wire (during drawing) -->
    @if (previewPath()) {
      <path [attr.d]="previewPath()"
            class="power-grid-board__preview"
            [attr.stroke]="previewColor()"
            fill="none"
            stroke-width="2"
            stroke-linecap="round"
            stroke-dasharray="8 4" />
    }
  </svg>
</div>
