<div class="data-relay">
  <!-- Toolbox Sidebar -->
  <aside class="data-relay__toolbox">
    <div class="data-relay__category-tabs">
      <button class="data-relay__category-tab"
              [class.data-relay__category-tab--active]="selectedCategory() === 'all'"
              (click)="selectCategory('all')">
        All (1)
      </button>
      @for (cat of categories(); track cat) {
        <button class="data-relay__category-tab"
                [class.data-relay__category-tab--active]="selectedCategory() === cat"
                [style.borderColor]="getCategoryColor(cat)"
                (click)="selectCategory(cat)">
          {{ cat }}
        </button>
      }
    </div>
    <div class="data-relay__pipe-list">
      @for (pipe of filteredPipes(); track pipe.id) {
        <div class="data-relay__pipe-item"
             [nxDraggable]="pipe.id"
             [nxDraggableData]="pipe"
             [style.borderLeftColor]="getCategoryColor(pipe.category)">
          {{ pipe.displayName }}
        </div>
      }
    </div>
  </aside>

  <!-- Main Stream Area -->
  <main class="data-relay__main">
    <app-data-relay-stream-visualizer
      [streams]="streams()"
      [streamResultMap]="streamResultMap()"
      [placementFeedback]="placementFeedback()"
      [availablePipes]="availablePipes()"
      (pipeSlotClicked)="onPipeClicked($event.streamId, $event.pipeBlock)"
      (pipeSlotRightClicked)="onPipeRemoved($event.streamId, $event.pipeBlockId)"
      (pipeDragTarget)="onPipePlaced($event.dropResult, $event.streamId)"
    />

    <!-- Inline Parameter Config Panel -->
    @if (selectedPipeBlock(); as selected) {
      <div class="data-relay__config-panel">
        <h4>Configure: {{ selected.pipeBlock.pipeType }}</h4>
        @for (param of editingParams(); track $index) {
          <input class="data-relay__config-input"
                 type="text"
                 [value]="param"
                 (input)="editingParams()[$index] = $any($event.target).value" />
        }
        <div class="data-relay__config-actions">
          <button class="data-relay__config-apply"
                  (click)="onParamsChanged(editingParams())">Apply</button>
          <button class="data-relay__config-cancel"
                  (click)="closeConfig()">Cancel</button>
        </div>
      </div>
    }

    <!-- Controls Bar -->
    <div class="data-relay__controls">
      <button class="data-relay__run-btn"
              [disabled]="engineStatus() !== 'playing'"
              (click)="onRun()">
        Run ({{ runCount() }})
      </button>
    </div>
  </main>
</div>
