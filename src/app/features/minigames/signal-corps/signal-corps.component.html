<div class="signal-corps" [class.signal-corps--damage]="damageShake()">
  <!-- SVG Defense Grid -->
  <svg class="signal-corps__svg"
       [attr.viewBox]="viewBox"
       preserveAspectRatio="xMidYMid meet">

    <!-- Grid lines -->
    @for (line of gridLines(); track $index) {
      <line class="signal-corps__grid-line"
            [attr.x1]="line.x1" [attr.y1]="line.y1"
            [attr.x2]="line.x2" [attr.y2]="line.y2" />
    }

    <!-- Towers -->
    @for (tower of towerPositions(); track tower.towerId) {
      <g class="signal-corps__tower"
         [class.signal-corps__tower--selected]="selectedTowerId() === tower.towerId"
         tabindex="0"
         role="button"
         [attr.aria-label]="'Tower ' + tower.towerId"
         (click)="onTowerClick(tower.towerId)"
         (keydown.enter)="onTowerClick(tower.towerId)">
        <rect [attr.x]="tower.x - towerSize / 2"
              [attr.y]="tower.y - towerSize / 2"
              [attr.width]="towerSize"
              [attr.height]="towerSize"
              rx="6" />
        <text [attr.x]="tower.x"
              [attr.y]="tower.y + 4"
              class="signal-corps__tower-label"
              text-anchor="middle">{{ tower.towerId }}</text>

        <!-- Input ports (left side) -->
        @if (playerTowers().get(tower.towerId); as towerState) {
          @for (inp of towerState.inputs; track inp.name) {
            <circle class="signal-corps__port signal-corps__port--input"
                    [attr.cx]="tower.x - towerSize / 2"
                    [attr.cy]="tower.y - 10 + $index * 16"
                    [attr.r]="portRadius"
                    [attr.fill]="portTypeColors.input" />
          }
          <!-- Output ports (right side) -->
          @for (out of towerState.outputs; track out.name) {
            <circle class="signal-corps__port signal-corps__port--output"
                    [attr.cx]="tower.x + towerSize / 2"
                    [attr.cy]="tower.y - 10 + $index * 16"
                    [attr.r]="portRadius"
                    [attr.fill]="portTypeColors.output" />
          }
        }
      </g>
    }

    <!-- Animating waves -->
    @for (wave of animatingWaves(); track wave.waveId) {
      <circle class="signal-corps__wave"
              [class.signal-corps__wave--blocked]="wave.animationComplete && wave.blocked"
              [class.signal-corps__wave--unblocked]="wave.animationComplete && !wave.blocked"
              [attr.cx]="getWaveX(wave)"
              [attr.cy]="getWaveY(wave)"
              [attr.r]="waveRadius" />
    }

    <!-- Shield pulses -->
    @for (pulse of shieldPulses(); track pulse.towerId) {
      <circle class="signal-corps__shield-pulse"
              [attr.cx]="pulse.x"
              [attr.cy]="pulse.y"
              [attr.r]="towerSize" />
    }
  </svg>

  <!-- Configuration panel overlay -->
  @if (selectedTowerId()) {
    <div class="signal-corps__config-backdrop"
         tabindex="-1"
         role="presentation"
         (click)="closeConfigPanel()"
         (keydown.escape)="closeConfigPanel()"></div>
    <div class="signal-corps__config-panel"
         [style.left]="configPanelStyle().left"
         [style.top]="configPanelStyle().top">
      <app-signal-corps-tower-config
        [towerId]="selectedTowerId()!"
        [tower]="selectedTowerConfig()"
        [bindings]="selectedTowerBindings()"
        [parentProperties]="parentProperties()"
        [parentHandlers]="parentHandlers()"
        (configApplied)="onConfigApplied($event)"
        (cancelled)="onConfigCancelled()" />
    </div>
  }

  <!-- Controls -->
  <div class="signal-corps__controls">
    <div class="signal-corps__health">
      Health: {{ stationHealth() }}
    </div>
    <div class="signal-corps__action-btns">
      <button class="signal-corps__deploy-btn"
              [disabled]="isDeploying()"
              (click)="onDeploy()">
        Deploy
      </button>
      <button class="signal-corps__reset-btn"
              (click)="onReset()">
        Reset
      </button>
    </div>
  </div>
</div>
