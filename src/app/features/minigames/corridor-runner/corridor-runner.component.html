<div class="corridor-runner">
  <!-- URL Bar -->
  <div class="corridor-runner__url-bar"
       [class.corridor-runner__url-bar--error]="animatingCrew()?.isHullBreach"
       aria-live="polite">
    <span class="corridor-runner__url-prefix">nexus://</span>{{ currentUrl() || '/' }}
  </div>

  <!-- Main content area -->
  <div class="corridor-runner__content">
    <!-- Config phase: code editor -->
    @if (phase() === 'config') {
      <div class="corridor-runner__editor-panel">
        <nx-code-editor
          [code]="routeConfigText()"
          language="json"
          (codeChange)="onCodeChange($event)" />
        @if (parseError()) {
          <div class="corridor-runner__parse-error" role="alert">
            {{ parseError() }}
          </div>
        }
      </div>
    }

    <!-- Station Map (shown in both phases, full width in run phase) -->
    <app-corridor-runner-map
      [stationMap]="mapLayout()"
      [configuredRoutes]="playerRouteConfig()"
      [crewPath]="crewPath()"
      [crewStep]="crewStep()"
      [isHullBreach]="crewIsHullBreach()"
      [isSuccess]="crewIsSuccess()"
      [animationComplete]="crewAnimationComplete()"
      [expanded]="mapExpanded()"
      (moduleClicked)="onModuleClicked($event)" />
  </div>

  <!-- Controls bar -->
  <div class="corridor-runner__controls">
    @if (phase() === 'config') {
      <button class="corridor-runner__lock-btn"
              [disabled]="!!parseError()"
              (click)="onLockRoutes()">
        Lock Routes
      </button>
    } @else {
      <button class="corridor-runner__run-btn"
              [disabled]="isAnimating()"
              (click)="onRunTest()">
        Run Test
      </button>
      <button class="corridor-runner__reset-btn"
              (click)="onReset()">
        Reset
      </button>
    }
  </div>
</div>
