<div class="terminal-hack">
  <div class="terminal-hack__scanlines"></div>

  <!-- Power gauge (hidden when timeLimit is 0) -->
  @if (timeLimit() > 0) {
    <div class="terminal-hack__power-gauge">
      <div class="terminal-hack__power-gauge-fill"
           [style.width.%]="powerGaugeRatio() * 100"
           [style.backgroundColor]="powerGaugeColor()">
      </div>
    </div>
  }

  <div class="terminal-hack__content">
    @if (targetFormSpec(); as spec) {
      <app-terminal-hack-code-panel
        [targetSpec]="spec"
        [initialCode]="''"
        [availableTools]="availableElements()"
        (codeChange)="onCodeChange($event)" />
    }

    <div class="terminal-hack__sidebar">
      @if (targetFormSpec(); as previewSpec) {
        <app-terminal-hack-live-preview
          [targetSpec]="previewSpec"
          [formElements]="placedElementsArray()"
          (elementClicked)="onSelectSlot($event)" />
      }

      <!-- Completion indicator -->
      <div class="terminal-hack__completion">
        {{ completionPercent() }}%
        @if (formPreview().isComplete) {
          <span class="terminal-hack__complete-badge">COMPLETE</span>
        }
      </div>

      <!-- Hints section -->
      <div class="terminal-hack__hints">
        <button class="terminal-hack__hint-btn"
                [disabled]="allHintsRevealed()"
                (click)="onUseHint()">
          Hint (-{{ hintScorePenalty }} pts)
        </button>
        @for (hint of revealedHints(); track hint.order) {
          <div class="terminal-hack__hint-text">{{ hint.text }}</div>
        }
      </div>
    </div>
  </div>

  <!-- Bottom panel: Test runner -->
  <app-terminal-hack-test-runner
    [testCases]="testCasesForRunner()"
    [testResults]="testRunResult()?.testCaseResults ?? null"
    [isRunning]="isTestsRunning()"
    (runTestsRequested)="onRunTests()" />
</div>
